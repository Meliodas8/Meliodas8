name: Update top languages svg

on:
  schedule:
    - cron: "15 3 * * *" # todos los días 03:15 UTC
  workflow_dispatch: {}

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download top languages svg
        env:
          TOKEN: ${{ secrets.PROFILE_STATS_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p assets

          curl -fSL \
            "https://github-readme-stats.vercel.app/api/top-langs/?username=Meliodas8&layout=compact&hide_border=true&langs_count=10&count_private=true&token=${TOKEN}" \
            -o assets/top-langs.svg

          echo "Downloaded file info:"
          ls -la assets
          head -n 5 assets/top-langs.svg

      - name: Commit & push if changed
        run: |
          set -euo pipefail

          # Detecta cambios incluyendo archivos nuevos (untracked)
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/top-langs.svg
          git commit -m "chore: update top languages svg"
          git push
