name: Update top languages svg

on:
  schedule:
    - cron: "15 3 * * *"  # todos los días 03:15 UTC
  workflow_dispatch: {}

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure assets dir
        run: mkdir -p assets

      - name: Download top languages svg (includes private via token)
        env:
          TOKEN: ${{ secrets.PROFILE_STATS_TOKEN }}
        run: |
          curl -L \
            -H "Authorization: Bearer $TOKEN" \
            "https://github-readme-stats.vercel.app/api/top-langs/?username=Meliodas8&layout=compact&hide_border=true&langs_count=10&private=true" \
            -o assets/top-langs.svg

      - name: Commit & push if changed
        run: |
          if git diff --quiet; then
            echo "No changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/top-langs.svg
          git commit -m "chore: update top languages svg"
          git push
